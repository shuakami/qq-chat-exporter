<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Chat Demo</title>
<link rel="stylesheet" href="modern_css.css">
<style>
  body { background: #ffffff; }
  .demo-wrap { width: 560px; margin: 0 auto; padding: 24px 20px; background:#fff; }
  .message-wrapper { max-width: 78% !important; }
  .image-content { max-width: 300px !important; }
</style>
</head>
<body>
<div class="demo-wrap">

  <div class="message-block">
    <div class="message other">
      <div class="avatar"><img src="av_okabe.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">冈部伦太郎</span><span class="time">21:04</span></div>
        <div class="message-bubble"><div class="content"><div class="image-content"><img src="pic_comet.jpg"></div></div></div>
      </div>
    </div>
  </div>

  <div class="message-block">
    <div class="message other">
      <div class="avatar"><img src="av_okabe.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">冈部伦太郎</span><span class="time">21:04</span></div>
        <div class="message-bubble"><div class="content"><span class="text-content">刚才天上那个，绝对是机关的时间机器</span></div></div>
      </div>
    </div>
  </div>

  <div class="message-block">
    <div class="message self">
      <div class="avatar"><img src="av_kurisu.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">牧濑红莉栖</span><span class="time">21:05</span></div>
        <div class="message-bubble"><div class="content"><span class="text-content">那是彗星。初中物理，重修</span></div></div>
      </div>
    </div>
  </div>

  <div class="message-block">
    <div class="message other">
      <div class="avatar"><img src="av_okabe.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">冈部伦太郎</span><span class="time">21:05</span></div>
        <div class="message-bubble"><div class="content"><span class="text-content">愚蠢！命运探知之魔眼是不会看错的</span></div></div>
      </div>
    </div>
  </div>

  <div class="message-block">
    <div class="message self">
      <div class="avatar"><img src="av_kurisu.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">牧濑红莉栖</span><span class="time">21:06</span></div>
        <div class="message-bubble"><div class="content"><span class="text-content">行吧疯狂科学家，这段我已经导出存档了</span></div></div>
      </div>
    </div>
  </div>

  <div class="message-block">
    <div class="message self">
      <div class="avatar"><img src="av_kurisu.jpg" alt=""></div>
      <div class="message-wrapper">
        <div class="message-header"><span class="sender">牧濑红莉栖</span><span class="time">21:06</span></div>
        <div class="message-bubble"><div class="content"><span class="text-content">下次开会当着大家的面念</span></div></div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
