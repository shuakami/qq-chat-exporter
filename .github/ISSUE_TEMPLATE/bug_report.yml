name: "🐛 问题反馈"
description: "遇到问题了？一起来解决！"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 你好！
        
        感谢反馈！开始之前：
        
        - [ ] 查看 [已知问题汇总](https://github.com/shuakami/qq-chat-exporter/issues/164)
        - [ ] 确认使用的是最新版本
        - [ ] 搜索过已有 issue

  - type: dropdown
    id: os
    attributes:
      label: "💻 操作系统"
      options:
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - 其他 Linux
        - macOS（暂不支持）
    validations:
      required: true

  - type: input
    id: qq-version
    attributes:
      label: "📱 QQNT 版本"
      description: "设置 → 关于QQ"
      placeholder: "9.9.25-42941"
    validations:
      required: true

  - type: input
    id: qce-version
    attributes:
      label: "📦 QCE 版本"
      description: "Web界面或下载文件名"
      placeholder: "v5.0.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: "📥 安装方式"
      options:
        - "一键启动包（官方 Release）"
        - "手动安装到 NapCat"
        - "Docker"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: "🤔 发生了什么？"
      placeholder: |
        清楚描述问题
        
        例如:
        导出群聊消息时，进度到 50% 就报错退出了
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 复现步骤"
      placeholder: |
        1. 打开 QCE
        2. 选择一个群
        3. 点击导出
        4. 看到错误

  - type: textarea
    id: expected
    attributes:
      label: "✨ 期望结果"
      placeholder: |
        应该发生什么？

  - type: textarea
    id: logs
    attributes:
      label: "📋 错误日志"
      description: "来自终端、Web 界面或程序目录下的 `logs` 文件夹"
      render: shell
      placeholder: |
        粘贴错误信息
        
        [ERROR] xxx
        ...

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 截图"
      description: "拖拽图片到这里"

  - type: checkboxes
    id: evidence
    attributes:
      label: "📎 日志和截图确认"
      description: "请确认已提供完整日志和必要截图；如果某项不适用，请在问题描述中说明原因。"
      options:
        - label: "我已提供完整日志；即使启动失败，也已提供启动失败时生成的日志。"
          required: true
        - label: "我已提供必要截图；如果不适用，已在问题描述中说明。"
          required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "✅ 检查清单"
      options:
        - label: "QQ 已登录且运行中"
        - label: "Web 界面可以访问"
        - label: "尝试过重启 QCE"
