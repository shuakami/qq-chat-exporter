name: "🔧 安装问题"
description: "安装或启动 QCE 时遇到问题"
title: "[安装] "
labels: ["bug", "install"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔧 安装问题反馈
        
        安装遇到问题？告诉我们卡在哪一步！
        
        > 📖 [查看用户手册](https://sdjz.wiki/post/qce%E7%94%A8%E6%88%B7%E6%89%8B%E5%86%8C)

  - type: dropdown
    id: os
    attributes:
      label: "💻 操作系统"
      options:
        - "Windows 11"
        - "Windows 10"
        - "Windows 7/8"
        - "Linux (Ubuntu/Debian)"
        - "Linux (其他发行版)"
        - "macOS"
    validations:
      required: true

  - type: dropdown
    id: install-stage
    attributes:
      label: "📍 卡在哪一步？"
      options:
        - "下载/解压"
        - "启动 launcher"
        - "扫码登录"
        - "打开 Web 界面"
        - "输入 Token 验证"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "🤔 发生了什么？"
      placeholder: |
        描述你遇到的问题
        
        比如:
        - 双击 bat 文件闪退
        - 二维码无法显示
        - 浏览器打不开页面
        - Token 验证失败
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: "📋 错误信息"
      description: "来自控制台、浏览器或程序目录下的 `logs` 文件夹"
      render: shell
      placeholder: |
        粘贴控制台或浏览器的错误信息
        
        如果是闪退，尝试用 cmd 运行 bat 文件查看输出

  - type: checkboxes
    id: evidence
    attributes:
      label: "📎 日志和截图确认"
      description: "请确认已提供完整日志和必要截图；如果某项不适用，请在问题描述中说明原因。"
      options:
        - label: "我已提供完整日志；即使启动失败，也已提供启动失败时生成的日志。"
          required: true
        - label: "我已提供必要截图；如果不适用，已在问题描述中说明。"
          required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "✅ 检查清单"
      description: "请确认以下事项"
      options:
        - label: "已完整解压（不是在压缩包内运行）"
        - label: "路径不含中文或特殊字符"
        - label: "已查看用户手册的安装说明"
