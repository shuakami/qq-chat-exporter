version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/plugins/qq-chat-exporter"
      - "/qce-v4-tool"
      - "/qce-chunked-viewer"
      - "/qce-viewer"
      - "/installer"
      - "/uninstaller"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
