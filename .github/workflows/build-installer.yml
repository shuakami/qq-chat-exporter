name: 构建 QCE 安装器 (Tauri / Windows)

on:
  pull_request:
    paths:
      - 'installer/**'
      - 'uninstaller/**'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: installer

    steps:
      - name: "检出仓库"
        uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: "Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "Rust 缓存"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            installer/src-tauri
            uninstaller/src-tauri

      - name: "同步版本号 (from tag)"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          node scripts/sync-version.js "$VERSION"
          VERSION="${VERSION#v}"
          cd installer
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='${VERSION}';require('fs').writeFileSync(f,JSON.stringify(j,null,2))"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          cd ../uninstaller
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='${VERSION}';require('fs').writeFileSync(f,JSON.stringify(j,null,2))"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          echo "installer + uninstaller version -> ${VERSION}"
        working-directory: .

      # Build the uninstaller first so we can embed it into the Shell package.
      - name: "构建卸载器"
        run: |
          cd ../uninstaller
          npm install
          npm run tauri build -- --no-bundle

      # 完整 Shell 包会被直接拼接到 exe 尾部（zip 从文件尾部定位，
      # exe 仍可正常执行），安装器运行时从自身解压，无需联网下载。
      - name: "构建 Shell 完整包 (内嵌进 exe)"
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/quick-pack.py
        working-directory: .
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096
          QCE_VERSION: ${{ github.ref_name }}

      # Inject uninstaller exe into the Shell zip so it gets extracted
      # to the install directory alongside the main application files.
      - name: "注入卸载器到 Shell 包"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          UNINSTALLER="uninstaller/src-tauri/target/release/qce-uninstaller.exe"
          PKG=$(ls NapCat-QCE-Windows-x64-*.zip 2>/dev/null | head -1 || true)
          if [ -n "$PKG" ] && [ -f "$UNINSTALLER" ]; then
            # Determine the top-level directory inside the zip
            TOP_DIR=$(python3 -c "import zipfile,sys;z=zipfile.ZipFile(sys.argv[1]);print(z.namelist()[0].split('/')[0])" "$PKG")
            # Add uninstaller exe into the zip under the top-level directory
            python3 -c "import zipfile,sys; z=zipfile.ZipFile(sys.argv[1],'a'); z.write(sys.argv[2], sys.argv[3]+'/Uninstall QQ Chat Exporter.exe'); z.close()" "$PKG" "$UNINSTALLER" "$TOP_DIR"
            echo "Injected uninstaller into $PKG under $TOP_DIR/"
          else
            echo "Error: Shell package or uninstaller not found (PKG=$PKG, UNINSTALLER=$UNINSTALLER)"
            exit 1
          fi
        working-directory: .

      - name: "安装前端依赖"
        run: npm install

      - name: "构建 Tauri 安装器 (仅 exe, 不打包 MSI)"
        run: npm run tauri build -- --no-bundle

      - name: "整理产物"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          [ "$VERSION" = "$GITHUB_REF" ] && VERSION="dev"
          mkdir -p dist-installer
          OUT="dist-installer/QQChatExporter-Installer-${VERSION}.exe"
          cp "src-tauri/target/release/qce-installer.exe" "$OUT"
          PKG=$(ls ../NapCat-QCE-Windows-x64-*.zip 2>/dev/null | head -1 || true)
          if [ -n "$PKG" ]; then
            echo "内嵌完整包: $PKG"
            cat "$PKG" >> "$OUT"
          fi
          ls -lh dist-installer

      - name: "上传构建产物"
        uses: actions/upload-artifact@v4
        with:
          name: qce-installer-windows
          path: installer/dist-installer/*.exe
          retention-days: 7

      - name: "附加到 GitHub Release"
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: installer/dist-installer/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
