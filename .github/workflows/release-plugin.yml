name: 发布 NapCat + QCE 完整包

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:

permissions: write-all

jobs:
  get-napcat-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: "获取 NapCat 最新版本"
        id: get_version
        run: |
          NAPCAT_VERSION=$(curl -s https://api.github.com/repos/NapNeko/NapCatQQ/releases/latest | jq -r '.tag_name')
          if [ -z "$NAPCAT_VERSION" ] || [ "$NAPCAT_VERSION" == "null" ]; then
            echo "无法获取最新版本，使用默认版本"
            NAPCAT_VERSION="v4.8.119"
          fi
          echo "version=${NAPCAT_VERSION}" >> $GITHUB_OUTPUT
          echo "检测到 NapCat 版本: ${NAPCAT_VERSION}"

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
          cache-dependency-path: qce-v4-tool/pnpm-lock.yaml

      - name: "Build frontend"
        run: |
          pnpm install --no-frozen-lockfile
          QCE_VERSION="${GITHUB_REF_NAME#v}" pnpm run build
        working-directory: qce-v4-tool

      - name: "Upload frontend artifact"
        uses: actions/upload-artifact@v7
        with:
          name: qce-frontend-out
          path: qce-v4-tool/out
          retention-days: 7

  build-server-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            binary_path: qq-chat-export-server/target/release/qce-server
          - os: windows-latest
            platform: windows
            arch: x64
            binary_path: qq-chat-export-server/target/release/qce-server.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "Restore Rust cache"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: qq-chat-export-server
          shared-key: qce-server-${{ matrix.platform }}-${{ matrix.arch }}

      - name: "Build Rust server"
        run: cargo build --release
        working-directory: qq-chat-export-server
        env:
          QCE_VERSION: ${{ github.ref_name }}

      - name: "Upload Rust server artifact"
        uses: actions/upload-artifact@v7
        with:
          name: qce-server-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.binary_path }}
          retention-days: 7

  build-shell-packages:
    needs: [build-frontend, build-server-binaries]
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            arch: x64
            artifact_ext: zip
            server_artifact: qce-server-windows-x64
            server_binary: qce-server.exe
          - os: ubuntu-latest
            platform: Linux
            arch: x64
            artifact_ext: tar.gz
            server_artifact: qce-server-linux-x64
            server_binary: qce-server
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: "Download frontend artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-frontend-out
          path: qce-v4-tool/out

      - name: "Download Rust server artifact"
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.server_artifact }}
          path: prebuilt-server
      
      - name: "Sync version from tag"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          node scripts/sync-version.js "$VERSION"
        shell: bash
      
      - name: "Build Shell package"
        run: python${{ matrix.platform == 'Windows' && '' || '3' }} scripts/quick-pack.py
        shell: bash
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096
          QCE_VERSION: ${{ github.ref_name }}
          QCE_FRONTEND_OUT: qce-v4-tool/out
          QCE_SERVER_BINARY: prebuilt-server/${{ matrix.server_binary }}
      
      - name: "Upload Shell package artifact"
        uses: actions/upload-artifact@v7
        with:
          name: NapCat-QCE-${{ matrix.platform }}-${{ matrix.arch }}
          path: NapCat-QCE-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}.${{ matrix.artifact_ext }}
          retention-days: 7

  build-framework-package:
    needs: [build-frontend, build-server-binaries]
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: "Download frontend artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-frontend-out
          path: qce-v4-tool/out

      - name: "Download Windows Rust server artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-server-windows-x64
          path: prebuilt-server
      
      - name: "Build Framework package"
        run: python3 scripts/build-framework-plugin.py
        env:
          NODE_ENV: production
          QCE_VERSION: ${{ github.ref_name }}
          QCE_FRONTEND_OUT: qce-v4-tool/out
          QCE_SERVER_WINDOWS_X64: prebuilt-server/qce-server.exe
      
      - name: "Upload Framework package artifact"
        uses: actions/upload-artifact@v7
        with:
          name: NapCat-Framework-QCE
          path: NapCat-Framework-QCE-*.zip
          retention-days: 7

  build-napcat-plugin:
    needs: [build-frontend, build-server-binaries]
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: "Download frontend artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-frontend-out
          path: qce-v4-tool/out

      - name: "Download Linux Rust server artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-server-linux-x64
          path: prebuilt-server/linux

      - name: "Download Windows Rust server artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-server-windows-x64
          path: prebuilt-server/windows

      - name: "Sync version from tag"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          node scripts/sync-version.js "$VERSION"
        shell: bash

      - name: "Generate NapCatQQ overlay runtime"
        run: node tools/create-overlay-runtime.cjs
        working-directory: plugins/qq-chat-exporter

      - name: "Build NapCat plugin store package"
        run: python3 scripts/build-napcat-plugin.py
        env:
          NODE_ENV: production
          QCE_VERSION: ${{ github.ref_name }}
          QCE_FRONTEND_OUT: qce-v4-tool/out
          QCE_SERVER_LINUX_X64: prebuilt-server/linux/qce-server
          QCE_SERVER_WINDOWS_X64: prebuilt-server/windows/qce-server.exe

      - name: "Upload NapCat plugin artifact"
        uses: actions/upload-artifact@v7
        with:
          name: napcat-plugin-qce
          path: napcat-plugin-qce.zip
          retention-days: 7

  build-installer-binaries:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: "Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "Restore installer Rust cache"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            installer/src-tauri
            uninstaller/src-tauri
          shared-key: qce-installer-windows-x64

      - name: "Sync installer versions from tag"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          node scripts/sync-version.js "$VERSION"
          VERSION="${VERSION#v}"
          cd installer
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='${VERSION}';require('fs').writeFileSync(f,JSON.stringify(j,null,2))"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          cd ../uninstaller
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='${VERSION}';require('fs').writeFileSync(f,JSON.stringify(j,null,2))"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: "Build uninstaller"
        run: |
          cd uninstaller
          npm install
          npm run tauri build -- --no-bundle

      - name: "Install installer dependencies"
        run: npm install
        working-directory: installer

      - name: "Build Tauri installer"
        run: npm run tauri build -- --no-bundle
        working-directory: installer

      - name: "Stage installer binaries"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p installer/dist-installer
          INSTALLER="installer/src-tauri/target/release/qce-installer.exe"
          UNINSTALLER="uninstaller/src-tauri/target/release/qce-uninstaller.exe"
          if [ ! -f "$INSTALLER" ] || [ ! -f "$UNINSTALLER" ]; then
            echo "FAIL: Installer binaries not found (INSTALLER=$INSTALLER, UNINSTALLER=$UNINSTALLER)"
            exit 1
          fi
          cp "$INSTALLER" "installer/dist-installer/QQChatExporter-Installer-${VERSION}.exe"
          cp "$UNINSTALLER" "installer/dist-installer/qce-uninstaller.exe"
          ls -lh installer/dist-installer

      - name: "Upload installer binary artifact"
        uses: actions/upload-artifact@v7
        with:
          name: qce-installer-binaries
          path: installer/dist-installer/*.exe
          retention-days: 7

  build-installer-package:
    needs: [build-installer-binaries, build-shell-packages]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: "Download installer binary artifact"
        uses: actions/download-artifact@v4
        with:
          name: qce-installer-binaries
          path: installer-binaries

      - name: "Download Windows Shell package artifact"
        uses: actions/download-artifact@v4
        with:
          name: NapCat-QCE-Windows-x64
          path: shell-package

      - name: "Build embedded installer artifact"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          INSTALLER="installer-binaries/QQChatExporter-Installer-${VERSION}.exe"
          UNINSTALLER="installer-binaries/qce-uninstaller.exe"
          PKG=$(ls shell-package/NapCat-QCE-Windows-x64-*.zip 2>/dev/null | head -1 || true)
          if [ -z "$PKG" ] || [ ! -f "$INSTALLER" ] || [ ! -f "$UNINSTALLER" ]; then
            echo "FAIL: Missing input artifact (PKG=$PKG, INSTALLER=$INSTALLER, UNINSTALLER=$UNINSTALLER)"
            exit 1
          fi
          TOP_DIR=$(python3 -c "import zipfile,sys;z=zipfile.ZipFile(sys.argv[1]);print(z.namelist()[0].split('/')[0])" "$PKG")
          python3 -c "import zipfile,sys; z=zipfile.ZipFile(sys.argv[1],'a'); z.write(sys.argv[2], sys.argv[3]+'/Uninstall QQ Chat Exporter.exe'); z.close()" "$PKG" "$UNINSTALLER" "$TOP_DIR"
          mkdir -p dist-installer
          OUT="dist-installer/QQChatExporter-Installer-${VERSION}.exe"
          cp "$INSTALLER" "$OUT"
          cat "$PKG" >> "$OUT"
          ls -lh dist-installer

      - name: "Upload installer artifact"
        uses: actions/upload-artifact@v7
        with:
          name: qce-installer-windows
          path: dist-installer/*.exe
          retention-days: 7

  build-docker-image:
    runs-on: ubuntu-latest
    needs: [get-napcat-version]
    # The Docker image is a secondary artifact: a build/push failure here must
    # never block the GitHub Release of the plugin / shell packages below.
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/shuakami/napcat-qce:latest
            ghcr.io/shuakami/napcat-qce:${{ github.ref_name }}

  create-release:
    needs: [get-napcat-version, build-shell-packages, build-framework-package, build-napcat-plugin, build-installer-package]
    runs-on: ubuntu-latest
    
    steps:
      - name: "检出仓库"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: "Download Windows Shell package artifact"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/NapCat-QCE-Windows-x64
          name: NapCat-QCE-Windows-x64

      - name: "Download Linux Shell package artifact"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/NapCat-QCE-Linux-x64
          name: NapCat-QCE-Linux-x64

      - name: "Download Framework package artifact"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/NapCat-Framework-QCE
          name: NapCat-Framework-QCE

      - name: "下载 NapCat 插件构建产物"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/napcat-plugin-qce
          name: napcat-plugin-qce

      - name: "Download Windows installer artifact"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/qce-installer-windows
          name: qce-installer-windows
      
      - name: "准备发布文件"
        run: |
          mkdir -p release-files
          find artifacts/qce-installer-windows -type f -name "*.exe" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/NapCat-QCE-Windows-x64 -type f -name "*.zip" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/NapCat-QCE-Linux-x64 -type f -name "*.tar.gz" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/NapCat-Framework-QCE -type f -name "*.zip" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/napcat-plugin-qce -type f -name "*.zip" -exec cp {} release-files/ \; 2>/dev/null || true
          echo "发布文件列表："
          ls -lh release-files/
      
      - name: "生成发布说明"
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          NAPCAT_VERSION="${{ needs.get-napcat-version.outputs.version }}"
          
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # 生成更新内容
          CHANGELOG=""
          if [ -n "$PREV_TAG" ]; then
            while IFS= read -r commit; do
              subject=$(git log -1 --format="%s" "$commit")
              CHANGELOG="${CHANGELOG}- ${subject}
          "
            done < <(git log ${PREV_TAG}..HEAD --format="%H" --reverse)
          else
            CHANGELOG="- 首次发布完整集成包"
          fi
          printf '%s\n' "$CHANGELOG" | sed 's/^ *//' > CHANGELOG_RAW.txt
          
          # 判断是否为预发布版本
          PRERELEASE_NOTE=""
          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            PRERELEASE_NOTE="> [!WARNING]
          > **${VERSION} 为 Beta 测试版本**
          > 本版本包含大量新特性，但可能存在未知问题。如需在生产环境中使用或追求极致稳定，推荐下载 [最新稳定版](https://github.com/shuakami/qq-chat-exporter/releases?q=NOT+beta+NOT+alpha+NOT+rc&expanded=true)。"
          fi
          
          # 写入发布说明
          cat > RELEASE_NOTES.md << EOF
          ${PRERELEASE_NOTE}

          ### ${VERSION} 更新内容

          ${CHANGELOG}

          ### 下载

          | 包类型 | 平台 | 说明 | 文件 |
          |--------|------|------|------|
          | **一键安装包（推荐）** | Windows 7+ x64 | 内嵌完整运行环境，支持一键安装、自动登录与配置 | \`QQChatExporter-Installer-${VERSION}.exe\` |
          | **Shell 模式** | Windows x64 | 独立无头 (Headless) 运行环境，适合服务器或自动化部署 | \`NapCat-QCE-Windows-x64-${VERSION}.zip\` |
          | **Shell 模式** | Linux x64 | 独立无头 (Headless) 运行环境，适合服务器或 Docker 部署 | \`NapCat-QCE-Linux-x64-${VERSION}.tar.gz\` |
          | **Framework 模式** | Windows | 作为 QQNT 插件运行，与桌面端 QQ 共存 | \`NapCat-Framework-QCE-${VERSION}.zip\` |
          | **NapCat 插件商店包** | 跨平台 | 供已有 NapCat 环境的用户直接在插件商店安装 | \`napcat-plugin-qce.zip\` |

          > **版本选择指南**
          > - **一键安装包**：Windows 用户的首选。双击即可自动完成环境配置与登录（支持快捷登录或扫码），安装完毕后将自动唤起 WebUI 面板。
          > - **Shell 模式**：独立运行版本，需单独进行 QQ 登录，适用于服务器环境部署及自动化备份需求。
          > - **Framework 模式**：作为 QQNT 插件运行，与当前使用的桌面端 QQ 共享登录状态，适合日常使用 Windows 桌面版 QQ 的用户。
          > - **NapCat 插件商店包**：适用于已部署 NapCat 环境（含本地安装、Docker 或宿主机部署）的用户。请直接在 NapCat WebUI 的插件商店中搜索安装，**无需手动下载此压缩包**。

          <details>
          <summary>Shell 模式使用方法</summary>

          **完整模式**（需登录 QQ，支持导出新增聊天记录）：
          - **Windows**：解压后双击运行 \`launcher-user.bat\`
          - **Linux**：终端运行 \`./launcher-user.sh\`

          **独立模式**（无需登录 QQ，仅用于浏览已导出的记录文件）：
          - **Windows**：双击运行 \`start-standalone.bat\`
          - **Linux**：终端运行 \`./start-standalone.sh\`

          启动后，请在浏览器中访问 \`http://localhost:40653/qce\`。若使用完整模式，需输入控制台输出的访问令牌 (Access Token) 进行验证。

          </details>

          <details>
          <summary>Framework 模式使用方法</summary>

          **方式 A：通过 \`napiLoader.bat\` 运行（推荐）**

          此方式独立运行，无需预先安装 LiteLoaderQQNT。

          1. 解压下载的 \`NapCat-Framework-QCE-${VERSION}.zip\` 文件
          2. 确保当前已彻底退出正在运行的 QQ 客户端
          3. 双击运行 \`napiLoader.bat\` 脚本
          4. 若弹出 QQ 登录界面，请按常规方式完成登录
          5. 在浏览器中访问 \`http://localhost:40653/qce\`

          **方式 B：通过 LiteLoaderQQNT 加载（仅限特定需求用户）**

          此方式要求系统已配置好 LiteLoaderQQNT 环境。

          1. 参照 [LiteLoaderQQNT 官方文档](https://liteloaderqqnt.github.io/) 完成前置框架的安装
          2. 打开 QQ 设置，确认左侧菜单栏已出现 \`LiteLoaderQQNT\` 选项
          3. 按照 LiteLoaderQQNT 或 NapCat 官方文档中的标准插件安装流程，将本插件部署至对应目录

          <details>
          <summary>如何找到访问令牌？</summary>

          按下 \`Win + R\` 键，输入 \`%USERPROFILE%\\.qq-chat-exporter\` 并回车。打开该目录下的 \`security.json\` 文件，查找 \`accessToken\` 字段的值即可：

          \`\`\`json
          {
            "accessToken": "此处即为你的访问令牌",
            ...
          }
          \`\`\`

          </details>

          </details>

          <details>
          <summary>系统要求</summary>

          需配合 QQ 客户端版本 34606 及以上使用（推荐版本 9.9.19-34740），[前往下载](https://im.qq.com/)。

          - **Windows**：支持 Windows 10/11 x64。如运行报错提示缺少 DLL 文件，请安装 [Visual C++ 运行库](https://aka.ms/vs/17/release/vc_redist.x64.exe)。
          - **Linux**：支持 Ubuntu 20.04+ / Debian 11+ / CentOS 8+，需满足 glibc 2.31+。
          - **macOS**：⚠️ 受限于兼容性问题，暂不支持。

          </details>

          > [!CAUTION]
          > 本项目完全免费且开源，遵循 GPL-3.0 开源协议。如果您是通过付费渠道获取的本软件，请立即申请退款并进行举报。

          [使用文档](https://shuakami.github.io/qq-chat-exporter/) | [问题反馈](https://github.com/shuakami/qq-chat-exporter/issues) | [NapCat 项目](https://github.com/NapNeko/NapCatQQ)

          ### Contributors

          <a href="https://github.com/shuakami/qq-chat-exporter/graphs/contributors">
            <img src="https://contrib.rocks/image?repo=shuakami/qq-chat-exporter&max=12&columns=12" width="125" />
          </a>
          EOF
          
          # 移除每行开头的空格
          sed -i 's/^          //' RELEASE_NOTES.md
          echo "已为版本 ${VERSION} 生成发布说明"

      - name: "生成 Release Banner"
        id: release_banner
        continue-on-error: true
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          npm install --no-save --no-package-lock playwright@1.49.1
          npx playwright install --with-deps chromium
          node scripts/generate-release-banner.mjs "$VERSION" CHANGELOG_RAW.txt "release-files/release-banner-${VERSION}.png"

      - name: "将 Banner 插入发布说明"
        if: steps.release_banner.outcome == 'success'
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -f "release-files/release-banner-${VERSION}.png" ]; then
            awk -v ver="$VERSION" '
              $0 == "### " ver " 更新内容" { print "<details>"; print "<summary>完整更新内容</summary>"; inlist=1; next }
              inlist && /^### / { print "</details>"; print ""; inlist=0 }
              { print }
            ' RELEASE_NOTES.md > RELEASE_NOTES.tmp
            mv RELEASE_NOTES.tmp RELEASE_NOTES.md
            printf '![%s](https://github.com/%s/releases/download/%s/release-banner-%s.png)\n\n' "$VERSION" "${GITHUB_REPOSITORY}" "$VERSION" "$VERSION" | cat - RELEASE_NOTES.md > RELEASE_NOTES.tmp
            mv RELEASE_NOTES.tmp RELEASE_NOTES.md
          fi

      - name: "创建 GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release-files/NapCat-QCE-Windows-x64-${{ github.ref_name }}.zip
            release-files/NapCat-QCE-Linux-x64-${{ github.ref_name }}.tar.gz
            release-files/NapCat-Framework-QCE-${{ github.ref_name }}.zip
            release-files/napcat-plugin-qce.zip
            release-files/QQChatExporter-Installer-${{ github.ref_name }}.exe
            release-files/release-banner-${{ github.ref_name }}.png
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 触发索引更新工作流
      # 注：默认 GITHUB_TOKEN 创建的 Release 不会触发 on.release 事件，
      # 因此需要手动通过 workflow_dispatch 触发 update-index.yml
      - name: "触发 NapCat 插件索引自动更新"
        if: success() && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-index.yml',
              ref: 'master',
              inputs: {
                version: '${{ github.ref_name }}'
              }
            })
            console.log('已派发 update-index.yml 工作流')

      - name: "发布完成"
        run: |
          echo "========================================="
          echo "版本 ${{ github.ref_name }} 发布成功！"
          echo "========================================="
