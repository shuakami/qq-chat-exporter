name: Build QCE Uninstaller (Tauri / Windows)

# The uninstaller is bundled INTO the installer via build-installer.yml.
# This workflow only runs on PRs touching uninstaller/ for CI validation.

on:
  pull_request:
    paths:
      - 'uninstaller/**'
      - '.github/workflows/build-uninstaller.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-uninstaller:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: uninstaller

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: uninstaller/src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri uninstaller (exe only)
        run: npm run tauri build -- --no-bundle

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: qce-uninstaller-windows
          path: uninstaller/src-tauri/target/release/qce-uninstaller.exe
          retention-days: 7
