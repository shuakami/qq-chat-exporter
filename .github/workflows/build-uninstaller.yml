name: Build QCE Uninstaller (Tauri / Windows)

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  pull_request:
    paths:
      - 'uninstaller/**'
      - '.github/workflows/build-uninstaller.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-uninstaller:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: uninstaller

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: uninstaller/src-tauri

      - name: Sync version (from tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='${VERSION}';require('fs').writeFileSync(f,JSON.stringify(j,null,2))"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          echo "uninstaller version -> ${VERSION}"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri uninstaller (exe only)
        run: npm run tauri build -- --no-bundle

      - name: Collect artifacts
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          [ "$VERSION" = "$GITHUB_REF" ] && VERSION="dev"
          mkdir -p dist-uninstaller
          cp "src-tauri/target/release/qce-uninstaller.exe" "dist-uninstaller/QQChatExporter-Uninstaller-${VERSION}.exe"
          ls -lh dist-uninstaller

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qce-uninstaller-windows
          path: uninstaller/dist-uninstaller/*.exe
          retention-days: 7

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: uninstaller/dist-uninstaller/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
