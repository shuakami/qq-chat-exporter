name: Deploy Docs

on:
  push:
    branches:
      - master
    paths:
      - 'public/**'
      - 'docs/**'
      - 'scripts/build-docs-site.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install markdown pymdown-extensions
      - run: python scripts/build-docs-site.py
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
